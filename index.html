<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fentanyl Chess Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- PWA метатеги -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chess Online">
    <link rel="apple-touch-icon" href="/assets/icon-192x192.png">

    <!-- Service Worker регистрация -->
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.log('SW error:', err));
      });
    }
    </script>
</head>
<body>
    <div class="main-container">

        <div class="top-bar">
            <div id="user-info" class="hidden">
                <img id="user-photo" src="" alt="avatar">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn btn-outline">Выйти</button>
            </div>
            <div id="auth-buttons" class="auth-group">
                <button id="login-google" class="btn btn-primary">Google</button>
                <button id="login-email-trigger" class="btn btn-outline">Email</button>
            </div>
        </div>

        <div id="lobby-section" class="card hidden">
            <div class="lobby-header">
                <h1 class="section-title section-title-tight">Мои партии</h1>
                <button id="clear-finished-btn" class="btn btn-outline">🗑️ Очистить завершённые</button>
            </div>
            <div id="games-list" class="games-grid">Загрузка ваших игр...</div>
            <button id="create-game-btn" class="btn btn-primary btn-large">Создать новую игру</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="game-shell">
                <div class="game-layout game-layout-2col">

                    <!-- Левая колонка: статус + настройки + доска -->
                    <div class="game-main-column">
                        <div class="board-area">

                            <div class="game-status-header">
    <div class="player-badge" id="player-badge">
        <span class="player-icon"></span>
        <span id="user-color" class="player-color-text">Белые</span>
    </div>

    <div class="turn-status" id="turn-status">
        <span id="turn-text">Ваш ход</span>
    </div>

    <div class="status-actions">
        <button id="board-settings-toggle" class="board-settings-icon-btn" type="button" aria-label="Настройки доски" title="Настройки доски">
            ⚙
        </button>
    </div>
</div>

                            <div class="board-settings-bar">
                                <div id="board-settings-menu" class="board-settings-menu hidden">
                                    <div class="board-settings-group">
                                        <label for="theme-select">Тема доски</label>
                                        <select id="theme-select" class="board-settings-select">
                                            <option value="theme-classic">Classic</option>
                                            <option value="theme-forest">Forest</option>
                                            <option value="theme-ocean">Ocean</option>
                                            <option value="theme-dark">Dark</option>
                                            <option value="theme-marble">Marble</option>
                                            <option value="theme-chesscom">Chess.com</option>
                                            <option value="theme-lime">Lime</option>
                                            <option value="theme-middle-earth">Middle-earth</option>
                                        </select>
                                    </div>

                                    <div class="board-settings-group">
                                        <label for="piece-set-select">Фигурки</label>
                                        <select id="piece-set-select" class="board-settings-select" disabled>
                                            <option value="default">Скоро будет</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="board-wrapper">
                                <div id="myBoard"></div>

                                <!-- Оверлей подтверждения хода -->
                                <div id="confirm-move-box" class="confirm-overlay hidden">
                                    <button id="confirm-btn" class="btn-round btn-success">✓</button>
                                    <button id="cancel-move-btn" class="btn-round btn-danger">✕</button>
                                </div>

                                <!-- Оверлей запроса отмены -->
                                <div id="takeback-request-box" class="confirm-overlay confirm-overlay-plain hidden">
                                    <div class="request-card">
                                        <p>Соперник просит отменить последний ход</p>
                                        <div class="request-buttons">
                                            <button id="takeback-accept" class="btn-round btn-success">✓</button>
                                            <button id="takeback-reject" class="btn-round btn-danger">✕</button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Оверлей ничьей -->
                                <div id="draw-request-box" class="confirm-overlay confirm-overlay-plain hidden">
                                    <div class="request-card">
                                        <p id="draw-request-text">Соперник предлагает ничью</p>
                                        <div class="request-buttons">
                                            <button id="draw-accept" class="btn-round btn-success">✓</button>
                                            <button id="draw-reject" class="btn-round btn-danger">✕</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Правая колонка: кнопки + история + share -->
                    <div class="game-side-column">

                        <div class="controls controls-split">
                            <div class="controls-group controls-safe">
                                <button id="takeback-btn" class="btn btn-outline btn-control-size">Просить отмену</button>
                                <button id="exit-btn" class="btn btn-outline btn-control-size">В лобби</button>
                            </div>

                            <div class="controls-group controls-risky">
                                <button id="draw-btn" class="btn btn-draw btn-control-size">Предложить ничью</button>
                                <button id="resign-btn" class="btn btn-danger btn-control-size">Сдаться</button>
                            </div>
                        </div>

                        <div class="game-bottom-panel">
                            <div class="moves-card">
                                <h3>История ходов</h3>
                                <div id="move-list" class="move-list-content"></div>
                            </div>

                            <div class="share-box game-share-box">
                                <small>Пригласить друга</small>
                                <div class="share-container">
                                    <input type="text" id="room-link" readonly>
                                    <button id="share-btn" class="btn btn-primary">Поделиться</button>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <div id="email-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Вход или Регистрация</h3>
                <input type="email" id="email-input" placeholder="Ваша почта" class="input-field">
                <input type="password" id="password-input" placeholder="Пароль (мин. 6 символов)" class="input-field">
                
                <div class="modal-buttons email-auth-actions">
                    <button id="login-email-btn" class="btn btn-primary">Войти</button>
                    <button id="register-email-btn" class="btn btn-outline">Создать аккаунт</button>
                    <button id="close-email-modal" class="btn btn-danger">Отмена</button>
                </div>
                <p id="email-error" class="error-text error-text-danger hidden"></p>
            </div>
        </div>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title" class="modal-title-reset">Игра окончена</h2>
                <p id="modal-desc" class="modal-desc modal-desc-secondary"></p>
                <div class="pgn-actions pgn-actions-bar">
                    <button id="modal-copy-pgn" class="btn btn-outline pgn-action-btn">📋 Копировать</button>
                    <button id="modal-download-pgn" class="btn btn-outline pgn-action-btn">💾 Скачать .pgn</button>
                </div>
                <div class="game-modal-actions">
                    <button id="modal-rematch-btn" class="btn btn-primary btn-large">Новая партия (Реванш)</button>
                    <button id="modal-exit-btn" class="btn btn-outline">Выйти в лобби</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Библиотеки -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <!-- Firebase модуль -->
    <script type="module" src="js/firebase-config.js"></script>
    
    <!-- Наши модули -->
    <script src="js/utils.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/board-ui.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game-core.js"></script>
    <script src="js/app.js"></script>

    <script>
        setTimeout(() => {
            if (typeof ref === 'undefined') {
                console.error('Firebase functions not loaded!');
            } else {
                console.log('Firebase loaded successfully');
            }
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('board-settings-toggle');
            const menu = document.getElementById('board-settings-menu');
            const themeSelect = document.getElementById('theme-select');

            if (toggleBtn && menu) {
                toggleBtn.addEventListener('click', () => {
                    menu.classList.toggle('hidden');
                });

                document.addEventListener('click', (e) => {
                    const insideMenu = menu.contains(e.target);
                    const insideButton = toggleBtn.contains(e.target);

                    if (!insideMenu && !insideButton) {
                        menu.classList.add('hidden');
                    }
                });
            }

            if (themeSelect) {
                const savedTheme = localStorage.getItem('chess-theme') || 'theme-classic';
                themeSelect.value = savedTheme;

                themeSelect.addEventListener('change', (e) => {
                    if (window.setTheme) {
                        window.setTheme(e.target.value);
                    }
                });
            }
        });
    </script>
</body>
</html>
